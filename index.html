<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QUIKRIDE Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}

body{
    background-image: url('https://www.tripsavvy.com/thmb/OXkfbg5_k0PS3VidcIaCVTvNadI=/960x0/filters:no_upscale():max_bytes(150000):strip_icc()/a-red-car-drives-on-a-highway-near-the-ocean-113218541-589a03fe5f9b5874ee67a5bc.jpg');
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    font-family: 'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar {
    background-color: #000 !important;
    border-bottom: 3px solid #ff6a00;
}

.navbar-brand {
    font-weight: bold;
    color: #ff6a00 !important;
    font-size: 24px;
    letter-spacing: 2px;
}

/* FORM CONTAINER */
.form-container {
    background-color: rgba(0, 0, 0, 0.8);
    padding: 2rem;
    border-radius: 15px;
    border: 2px solid #ff6a00;
    box-shadow: 0 0 30px rgba(255,106,0,0.5);
}

/* HEADINGS */
.display-4 {
    color: #ff6a00;
    font-weight: 700;
}

.lead {
    color: #ffb37a;
}

/* LABELS */
label {
    color: #ffcc99;
}

/* INPUTS */
.form-control {
    background-color: #1a1a1a;
    border: 1px solid #ff6a00;
    color: white;
}

.form-control:focus {
    border-color: #ffa64d;
    box-shadow: 0 0 8px #ff6a00;
    background-color: #1a1a1a;
    color: white;
}

/* CHECKBOX */
.form-check-input {
    background-color: #1a1a1a;
    border: 1px solid #ff6a00;
}

/* BUTTONS */
.btn-primary {
    background-color: #ff6a00;
    border: none;
}

.btn-primary:hover {
    background-color: #ff8c1a;
}

.btn-secondary {
    background-color: #333;
    border: none;
}

.btn-secondary:hover {
    background-color: #555;
}

/* LINKS */
a {
    color: #ff6a00 !important;
}

a:hover {
    color: #ffa64d !important;
}

/* FOOTER */
footer {
    color: #ffb37a;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">

    <!-- Brand + Pages on LEFT -->
    <a class="navbar-brand me-4" href="#">QUIKRIDE</a>

    <ul class="navbar-nav me-auto d-flex flex-row gap-3">
      <li class="nav-item">
        <a class="nav-link text-orange" href="page2.html">Book a Ride</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-orange" href="page3.html">Earn</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-orange" href="page4.html">About us</a>
      </li>
    </ul>

    <li class="nav-item">
    <a class="btn btn-success text-white px-3 ms-3" href="main.html">
        Sign Up
    </a>
</li>

  </div>
</nav>

<br><br>

<!-- FORM -->
<div class="container text-light form-container">

    <p class="fw-bold display-4">Account Registration Form</p>

    <details>
        <summary>Instructions:</summary>
        <p id="instructions"></p>
    </details>

    <br>

    <span class="lead">Account Information</span>

    <form onsubmit="checkPassword(event)">

        <div class="row mt-3">
            <div class="col">
                <label>First Name:</label>
                <input type="text" class="form-control" placeholder="Enter First Name">
            </div>
            <div class="col">
                <label>Last Name:</label>
                <input type="text" class="form-control" placeholder="Enter Last Name">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col">
                <label>Age:</label>
                <input type="number" class="form-control" min="1">
            </div>
            <div class="col">
                <label>Phone Number:</label>
                <input type="text" class="form-control" placeholder="xxxx-xxx-xxxx">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col">
                <label>Email:</label>
                <input type="email" class="form-control" placeholder="JohnDoe@gmail.com">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col">
                <label>Enter your Username:</label>
                <input type="text" class="form-control">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col">
                <label>Enter your Password:</label>
                <input type="password" class="form-control" id="password">
            </div>
        </div>

        <div class="row mt-3">
            <div class="col">
                <label>Confirm your Password:</label>
                <input type="password" class="form-control" id="passwordconf">
            </div>
        </div>

        <div class="form-check mt-3">
            <input type="checkbox" class="form-check-input">
            <label class="form-check-label">
                I accept the 
                <a href="#">Terms of Use</a> 
                and 
                <a href="#">Privacy Policy</a>
            </label>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary text-white">Create my account</button>
            <button type="reset" class="btn btn-secondary">Cancel</button>
        </div>

    </form>

    <hr class="my-5">

    <!-- PROFILE PIC -->
    <div class="text-center">
        <h5 class="mb-3">Upload Your Photo</h5>

        <img src="https://img.freepik.com/premium-vector/default-avatar-profile-icon-social-media-user-image-gray-avatar-icon-blank-profile-silhouette-vector-illustration_561158-3485.jpg?w=1380"
             class="rounded-circle mb-3"
             width="150"
             height="150"
             id="profpic">

        <div class="mb-3 w-50 mx-auto">
            <input type="file" class="form-control">
        </div>

        <button class="btn btn-primary text-white" onclick="upload_pic()">
            Upload Photo
        </button>
    </div>

</div>

<footer class="text-center mt-4 mb-3">
    <p>QUIKRIDE ©2026</p>
</footer>

<script>

function upload_pic()
{
    window.alert('Your Profile Picture has been uploaded');
    document.getElementById('profpic').src="https://www.profilebakery.com/wp-content/uploads/2023/04/Profile-Image-AI.jpg";
}

document.getElementById("instructions").innerHTML =
"Please fill out the following fields with accurate information. Review everything carefully before submitting your QUIKRIDE account.";

function checkPassword(event) {
    event.preventDefault(); // stop default form submit

    var password = document.getElementById("password").value;
    var confirmPassword = document.getElementById("passwordconf").value;

    if(password !== confirmPassword){
        window.alert("Passwords do not match!");
    } else {
        window.location.href = "home.html"; // change to your homepage file
    }
}

</script>

</body>
</html>
